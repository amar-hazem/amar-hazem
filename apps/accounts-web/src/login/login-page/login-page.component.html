<form [formGroup]="loginForm" (ngSubmit)="login()" novalidate>
  <mat-card>
    <mat-card-header>
      <mat-card-title>Sign In</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input formControlName="email" matInput placeholder="Email" type="text" />
        <mat-error *ngIf="loginForm.controls['email'].hasError('required')">
          Email is <strong>required</strong>
        </mat-error>
        <mat-error *ngIf="loginForm.controls['email'].hasError('email')"> Please provide an email </mat-error>
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Password</mat-label>
        <input formControlName="password" matInput placeholder="Password" type="password" />
        <mat-error *ngIf="loginForm.controls['password'].hasError('required')">
          Password is <strong>required</strong>
        </mat-error>
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions align="end">
      <button color="primary" [disabled]="!loginForm.valid" mat-raised-button type="submit">Sign In</button>
    </mat-card-actions>
    <mat-card-footer>
      <a mat-button [routerLink]="'/sign-up'">Need to create an account?</a>
    </mat-card-footer>
  </mat-card>
</form>
