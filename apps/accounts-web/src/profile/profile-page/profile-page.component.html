<form [formGroup]="editForm" (ngSubmit)="edit()" novalidate>
  <mat-card>
    <mat-card-header>
      <mat-card-title>Your profile</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field appearance="fill">
        <mat-label>First Name</mat-label>
        <input formControlName="firstName" matInput placeholder="First Name" type="text" />
        <mat-error *ngIf="editForm.controls['firstName'].hasError('required')">
          First Name is <strong>required</strong>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Last Name</mat-label>
        <input formControlName="lastName" matInput placeholder="Last Name" type="text" />
        <mat-error *ngIf="editForm.controls['lastName'].hasError('required')">
          Last Name is <strong>required</strong>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input formControlName="email" matInput placeholder="Email" type="email" />
        <mat-error *ngIf="editForm.controls['email'].hasError('required')">
          Email is <strong>required</strong>
        </mat-error>
        <mat-error *ngIf="editForm.controls['email'].hasError('email')"> Please provide an email </mat-error>
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions align="end">
      <button (click)="delete()" color="warn" mat-raised-button type="button">Delete account</button>
      <button color="primary" [disabled]="!editForm.valid" mat-raised-button type="submit">Edit</button>
    </mat-card-actions>
  </mat-card>
</form>
