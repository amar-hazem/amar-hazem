<form [formGroup]="registerForm" (ngSubmit)="register()" novalidate>
  <mat-card>
    <mat-card-header>
      <mat-card-title>Sign Up</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field appearance="fill">
        <mat-label>First Name</mat-label>
        <input formControlName="firstName" matInput placeholder="First Name" type="text" />
        <mat-error *ngIf="registerForm.controls['firstName'].hasError('required')">
          First Name is <strong>required</strong>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Last Name</mat-label>
        <input formControlName="lastName" matInput placeholder="Last Name" type="text" />
        <mat-error *ngIf="registerForm.controls['lastName'].hasError('required')">
          Last Name is <strong>required</strong>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input formControlName="email" matInput placeholder="Email" type="email" />
        <mat-error *ngIf="registerForm.controls['email'].hasError('required')">
          Email is <strong>required</strong>
        </mat-error>
        <mat-error *ngIf="registerForm.controls['email'].hasError('email')"> Please provide an email </mat-error>
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Password</mat-label>
        <input formControlName="password" matInput placeholder="Password" type="password" />
        <mat-error *ngIf="registerForm.controls['password'].hasError('required')">
          Password is <strong>required</strong>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Password Confirmation</mat-label>
        <input formControlName="passwordConfirmation" matInput placeholder="Password Confirmation" type="password" />
        <mat-error *ngIf="registerForm.controls['passwordConfirmation'].hasError('required')">
          Password Confirmation is <strong>required</strong>
        </mat-error>
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions align="end">
      <button color="primary" [disabled]="!registerForm.valid" mat-raised-button type="submit">Sign Up</button>
    </mat-card-actions>
    <mat-card-footer>
      <a mat-button [routerLink]="'/sign-in'">Already have an account?</a>
    </mat-card-footer>
  </mat-card>
</form>
